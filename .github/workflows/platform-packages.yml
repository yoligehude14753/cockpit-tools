name: Platform Packages

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Build channel"
        required: true
        default: "ci"
        type: choice
        options:
          - "ci"
          - "main"
      publish_main_branch:
        description: "Upload unified platform package artifacts to the main release and commit index.json/index.seed.json to main"
        required: false
        default: false
        type: boolean
  pull_request:
    branches:
      - "main"
    paths:
      - ".github/workflows/platform-packages.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "platform-packages/**"
      - "package.json"
      - "scripts/build-platform-ui.cjs"
      - "scripts/build-platform-package-history.cjs"
      - "scripts/build-platform-package-index.cjs"
      - "scripts/package-platform-package.cjs"
      - "scripts/verify-platform-packages.cjs"
      - "src/**"
      - "src-tauri/**"

concurrency:
  group: platform-packages-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Check locales
        run: node scripts/check_locales.cjs

      - name: Verify checked-in platform packages
        run: npm run verify:platform-packages -- --source-only

  package:
    name: Package (${{ matrix.label }})
    needs: preflight
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "macos-aarch64"
            runner: "macos-latest"
            package_os: "macos"
            package_arch: "aarch64"
            rust_targets: "aarch64-apple-darwin"
            cargo_args: "--target aarch64-apple-darwin"
            adapter_bin_dir: "target/aarch64-apple-darwin/release"
          - label: "macos-x86_64"
            runner: "macos-latest"
            package_os: "macos"
            package_arch: "x86_64"
            rust_targets: "x86_64-apple-darwin"
            cargo_args: "--target x86_64-apple-darwin"
            adapter_bin_dir: "target/x86_64-apple-darwin/release"
          - label: "linux-x86_64"
            runner: "ubuntu-22.04"
            package_os: "linux"
            package_arch: "x86_64"
            rust_targets: ""
            cargo_args: ""
            adapter_bin_dir: "target/release"
          - label: "linux-aarch64"
            runner: "ubuntu-24.04-arm"
            package_os: "linux"
            package_arch: "aarch64"
            rust_targets: ""
            cargo_args: ""
            adapter_bin_dir: "target/release"
          - label: "windows-x86_64"
            runner: "windows-latest"
            package_os: "windows"
            package_arch: "x86_64"
            rust_targets: ""
            cargo_args: ""
            adapter_bin_dir: "target/release"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf pkg-config libsoup-3.0-dev javascriptcoregtk-4.1 libjavascriptcoregtk-4.1-dev libnm-dev xdg-utils zip unzip

      - name: Rust setup
        if: matrix.rust_targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Rust setup with target
        if: matrix.rust_targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Go setup
        uses: actions/setup-go@v5
        with:
          go-version-file: sidecars/cockpit-cliproxy/go.mod
          cache-dependency-path: sidecars/cockpit-cliproxy/go.sum

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install

      - name: Build all platform remote UIs
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const fs = require('node:fs');
          const path = require('node:path');

          function loadPlatformPackages() {
            const index = JSON.parse(fs.readFileSync('platform-packages/index.json', 'utf8'));
            const packageRoot = 'platform-packages';
            const manifestsById = new Map();
            for (const dirent of fs.readdirSync(packageRoot, { withFileTypes: true })) {
              if (!dirent.isDirectory()) continue;
              const manifestPath = path.join(packageRoot, dirent.name, 'manifest.json');
              if (!fs.existsSync(manifestPath)) continue;
              const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
              manifestsById.set(manifest.id || dirent.name, manifest);
            }

            const packages = [];
            for (const indexedPackage of index.packages || []) {
              const manifest = manifestsById.get(indexedPackage.id);
              if (!manifest) continue;
              packages.push({ ...indexedPackage, ...manifest });
              manifestsById.delete(indexedPackage.id);
            }
            for (const manifest of manifestsById.values()) {
              packages.push(manifest);
            }
            return packages.filter((pkg) => pkg.packageMode === 'hotUpdate');
          }

          for (const pkg of loadPlatformPackages()) {
            execFileSync(process.execPath, ['scripts/build-platform-ui.cjs', pkg.id], { stdio: 'inherit' });
          }
          NODE

      - name: Build sidecar adapters
        shell: bash
        env:
          CARGO_ARGS: ${{ matrix.cargo_args }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const fs = require('node:fs');
          const path = require('node:path');
          const cargoArgs = (process.env.CARGO_ARGS || '').split(/\s+/).filter(Boolean);
          const crateNameByPlatformId = new Map([
            ['claude_manager', 'cockpit-claude-adapter'],
          ]);

          function loadPlatformPackages() {
            const index = JSON.parse(fs.readFileSync('platform-packages/index.json', 'utf8'));
            const packageRoot = 'platform-packages';
            const manifestsById = new Map();
            for (const dirent of fs.readdirSync(packageRoot, { withFileTypes: true })) {
              if (!dirent.isDirectory()) continue;
              const manifestPath = path.join(packageRoot, dirent.name, 'manifest.json');
              if (!fs.existsSync(manifestPath)) continue;
              const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
              manifestsById.set(manifest.id || dirent.name, manifest);
            }

            const packages = [];
            for (const indexedPackage of index.packages || []) {
              const manifest = manifestsById.get(indexedPackage.id);
              if (!manifest) continue;
              packages.push({ ...indexedPackage, ...manifest });
              manifestsById.delete(indexedPackage.id);
            }
            for (const manifest of manifestsById.values()) {
              packages.push(manifest);
            }
            return packages.filter((pkg) => pkg.packageMode === 'hotUpdate');
          }

          for (const pkg of loadPlatformPackages()) {
            if (pkg.installKind !== 'sidecarAdapter') continue;
            const crate = crateNameByPlatformId.get(pkg.id) || `cockpit-${pkg.id.replace(/_/g, '-')}-adapter`;
            execFileSync('cargo', ['build', '--release', '-p', crate, ...cargoArgs], { stdio: 'inherit' });
          }
          NODE

      - name: Build Codex helper sidecar
        shell: bash
        env:
          PACKAGE_OS: ${{ matrix.package_os }}
          PACKAGE_ARCH: ${{ matrix.package_arch }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const fs = require('node:fs');
          const path = require('node:path');

          const os = process.env.PACKAGE_OS;
          const arch = process.env.PACKAGE_ARCH;
          const goOsByPackageOs = new Map([
            ['macos', 'darwin'],
            ['windows', 'windows'],
            ['linux', 'linux'],
          ]);
          const goArchByPackageArch = new Map([
            ['x86_64', 'amd64'],
            ['aarch64', 'arm64'],
          ]);
          const rustTargetByPackageOs = new Map([
            ['macos', `${arch}-apple-darwin`],
            ['windows', `${arch}-pc-windows-msvc`],
            ['linux', `${arch}-unknown-linux-gnu`],
          ]);
          const goos = goOsByPackageOs.get(os);
          const goarch = goArchByPackageArch.get(arch);
          const rustTarget = rustTargetByPackageOs.get(os);
          if (!goos || !goarch || !rustTarget) {
            throw new Error(`Unsupported Codex helper target: ${os}/${arch}`);
          }

          const sidecarDir = path.resolve('sidecars/cockpit-cliproxy');
          const outputDir = path.join(sidecarDir, 'bin');
          const output = path.join(outputDir, `cockpit-cliproxy-${rustTarget}${os === 'windows' ? '.exe' : ''}`);
          fs.mkdirSync(outputDir, { recursive: true });
          execFileSync('go', [
            'build',
            '-trimpath',
            '-ldflags',
            '-s -w',
            '-o',
            output,
            '.',
          ], {
            cwd: sidecarDir,
            env: {
              ...process.env,
              GOOS: goos,
              GOARCH: goarch,
              CGO_ENABLED: '0',
            },
            stdio: 'inherit',
          });
          console.log(`Built ${path.relative(process.cwd(), output)}`);
          NODE

      - name: Package platform artifacts
        shell: bash
        env:
          PACKAGE_OS: ${{ matrix.package_os }}
          PACKAGE_ARCH: ${{ matrix.package_arch }}
          ADAPTER_BIN_DIR: ${{ matrix.adapter_bin_dir }}
        run: |
          set -euo pipefail
          mkdir -p platform-packages/dist-ci
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const fs = require('node:fs');
          const path = require('node:path');

          function loadPlatformPackages() {
            const index = JSON.parse(fs.readFileSync('platform-packages/index.json', 'utf8'));
            const packageRoot = 'platform-packages';
            const manifestsById = new Map();
            for (const dirent of fs.readdirSync(packageRoot, { withFileTypes: true })) {
              if (!dirent.isDirectory()) continue;
              const manifestPath = path.join(packageRoot, dirent.name, 'manifest.json');
              if (!fs.existsSync(manifestPath)) continue;
              const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
              manifestsById.set(manifest.id || dirent.name, manifest);
            }

            const packages = [];
            for (const indexedPackage of index.packages || []) {
              const manifest = manifestsById.get(indexedPackage.id);
              if (!manifest) continue;
              packages.push({ ...indexedPackage, ...manifest });
              manifestsById.delete(indexedPackage.id);
            }
            for (const manifest of manifestsById.values()) {
              packages.push(manifest);
            }
            return packages.filter((pkg) => pkg.packageMode === 'hotUpdate');
          }

          for (const pkg of loadPlatformPackages()) {
            const metadataName = `${pkg.id}-${pkg.version}-${process.env.PACKAGE_OS}-${process.env.PACKAGE_ARCH}.json`;
            const args = [
              'scripts/package-platform-package.cjs',
              '--platform', pkg.id,
              '--os', process.env.PACKAGE_OS,
              '--arch', process.env.PACKAGE_ARCH,
              '--filename-template', 'os-arch',
              '--dist-dir', 'platform-packages/dist-ci',
              '--metadata-out', path.join('platform-packages', 'dist-ci', metadataName),
            ];
            if (pkg.installKind === 'sidecarAdapter') {
              args.push('--adapter-bin-dir', process.env.ADAPTER_BIN_DIR);
            }
            execFileSync(process.execPath, args, { stdio: 'inherit' });
          }
          NODE

      - name: Upload platform package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: platform-packages-${{ matrix.label }}
          retention-days: 14
          if-no-files-found: error
          path: |
            platform-packages/dist-ci/*.zip
            platform-packages/dist-ci/*.json

  aggregate:
    name: Aggregate Index
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'ci' }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MAIN_PLATFORM_RELEASE_TAG: platform-packages-main
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download platform package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: platform-packages-*
          path: platform-packages/dist-ci
          merge-multiple: true

      - name: Build merged platform package index
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --metadata-dir platform-packages/dist-ci
            --verify-zip-dir platform-packages/dist-ci
            --require-os-arch macos/aarch64,macos/x86_64,linux/x86_64,linux/aarch64,windows/x86_64
            --output platform-packages/dist-ci/index.json
          )
          if [ "${CHANNEL}" = "main" ]; then
            args+=(--download-base-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${MAIN_PLATFORM_RELEASE_TAG}")
            args+=(--history-dir platform-packages/history)
          fi
          npm run package:platform-index -- "${args[@]}"

      - name: Upload merged platform package index
        uses: actions/upload-artifact@v4
        with:
          name: platform-packages-index
          retention-days: 14
          if-no-files-found: error
          path: platform-packages/dist-ci/index.json

      - name: Publish main platform package branch
        if: github.event_name == 'workflow_dispatch' && inputs.channel == 'main' && inputs.publish_main_branch == true
        shell: bash
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          cp platform-packages/dist-ci/*.zip "${tmp_dir}/"
          cp platform-packages/dist-ci/index.json "${tmp_dir}/index.json"

          release_notes="${tmp_dir}/release-notes.md"
          cat > "${release_notes}" <<EOF
          Cockpit Tools main platform packages.

          This prerelease stores platform package zip artifacts for the main channel.
          EOF

          upload_platform_assets_immutably() {
            local release_tag="$1"
            local upload_args=()
            index_asset_metadata() {
              local asset_name="$1"
              node -e '
                const fs = require("node:fs");
                const [indexPath, assetName] = process.argv.slice(1);
                const index = JSON.parse(fs.readFileSync(indexPath, "utf8"));
                for (const pkg of index.packages || []) {
                  for (const artifact of pkg.artifacts || []) {
                    const url = String(artifact.downloadUrl || "");
                    if (url.endsWith(`/${assetName}`)) {
                      console.log(`${artifact.sha256} ${artifact.downloadSizeBytes}`);
                      process.exit(0);
                    }
                  }
                }
                process.exit(1);
              ' "${tmp_dir}/index.json" "${asset_name}"
            }
            for zip_path in "${tmp_dir}"/*.zip; do
              local asset_name
              asset_name="$(basename "${zip_path}")"
              local expected_metadata expected_sha expected_size
              expected_metadata="$(index_asset_metadata "${asset_name}")"
              expected_sha="$(awk '{print $1}' <<<"${expected_metadata}")"
              expected_size="$(awk '{print $2}' <<<"${expected_metadata}")"
              local existing_dir
              existing_dir="$(mktemp -d)"
              if gh release download "${release_tag}" \
                --repo "${GITHUB_REPOSITORY}" \
                --pattern "${asset_name}" \
                --dir "${existing_dir}" >/dev/null 2>&1; then
                local existing_path="${existing_dir}/${asset_name}"
                if [ ! -f "${existing_path}" ]; then
                  echo "Downloaded release asset is missing: ${asset_name}" >&2
                  exit 1
                fi
                local local_sha remote_sha
                local_sha="$(shasum -a 256 "${zip_path}" | awk '{print $1}')"
                remote_sha="$(shasum -a 256 "${existing_path}" | awk '{print $1}')"
                if [ "${local_sha}" != "${remote_sha}" ]; then
                  if [ "${expected_sha}" = "${remote_sha}" ]; then
                    echo "Reusing immutable release asset from index history: ${asset_name}"
                    continue
                  fi
                  echo "Refusing to replace immutable platform package asset ${asset_name}: local=${local_sha}, remote=${remote_sha}" >&2
                  echo "Bump the platform package version instead of overwriting an existing zip." >&2
                  exit 1
                fi
                echo "Release asset already exists with identical sha256: ${asset_name}"
              else
                local local_sha
                local_sha="$(shasum -a 256 "${zip_path}" | awk '{print $1}')"
                if [ "${expected_sha}" != "${local_sha}" ]; then
                  echo "Release asset ${asset_name} is missing, but index expects sha=${expected_sha}; local rebuilt sha=${local_sha}" >&2
                  exit 1
                fi
                upload_args+=("${zip_path}")
              fi
            done
            if [ "${#upload_args[@]}" -gt 0 ]; then
              gh release upload "${release_tag}" "${upload_args[@]}" --repo "${GITHUB_REPOSITORY}"
            fi

            local verify_dir
            verify_dir="$(mktemp -d)"
            for zip_path in "${tmp_dir}"/*.zip; do
              local asset_name
              asset_name="$(basename "${zip_path}")"
              local expected_metadata expected_sha expected_size
              expected_metadata="$(index_asset_metadata "${asset_name}")"
              expected_sha="$(awk '{print $1}' <<<"${expected_metadata}")"
              expected_size="$(awk '{print $2}' <<<"${expected_metadata}")"
              gh release download "${release_tag}" \
                --repo "${GITHUB_REPOSITORY}" \
                --pattern "${asset_name}" \
                --dir "${verify_dir}" >/dev/null
              local local_size remote_size local_sha remote_sha
              local_size="$(wc -c < "${zip_path}" | tr -d ' ')"
              remote_size="$(wc -c < "${verify_dir}/${asset_name}" | tr -d ' ')"
              local_sha="$(shasum -a 256 "${zip_path}" | awk '{print $1}')"
              remote_sha="$(shasum -a 256 "${verify_dir}/${asset_name}" | awk '{print $1}')"
              if [ "${remote_size}" != "${expected_size}" ] || [ "${remote_sha}" != "${expected_sha}" ]; then
                echo "Release asset verification failed against index: ${asset_name}" >&2
                echo "index size=${expected_size} sha=${expected_sha}" >&2
                echo "remote size=${remote_size} sha=${remote_sha}" >&2
                echo "local size=${local_size} sha=${local_sha}" >&2
                exit 1
              fi
              rm -f "${verify_dir}/${asset_name}"
            done
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --depth=1 origin main
          git switch -C main FETCH_HEAD

          mkdir -p "${tmp_dir}/history"
          node scripts/build-platform-package-history.cjs \
            --index "${tmp_dir}/index.json" \
            --history-dir platform-packages/history \
            --output-dir "${tmp_dir}/history"

          if gh release view "${MAIN_PLATFORM_RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${MAIN_PLATFORM_RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Cockpit Tools Main Platform Packages" \
              --notes-file "${release_notes}" \
              --prerelease \
              --latest=false
          else
            gh release create "${MAIN_PLATFORM_RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Cockpit Tools Main Platform Packages" \
              --notes-file "${release_notes}" \
              --prerelease \
              --latest=false
          fi
          upload_platform_assets_immutably "${MAIN_PLATFORM_RELEASE_TAG}"

          git rm -r --ignore-unmatch platform-packages/dist
          rm -rf platform-packages/history
          mkdir -p platform-packages/history
          cp "${tmp_dir}/index.json" platform-packages/index.json
          cp "${tmp_dir}/index.json" platform-packages/index.seed.json
          cp "${tmp_dir}/history"/*.json platform-packages/history/
          echo "Published $(find "${tmp_dir}" -maxdepth 1 -type f -name '*.zip' | wc -l | tr -d ' ') platform package zip files to release ${MAIN_PLATFORM_RELEASE_TAG}."

          git add platform-packages/index.json platform-packages/index.seed.json platform-packages/history
          if git diff --cached --quiet; then
            echo "No main platform package changes to publish."
            exit 0
          fi

          git commit -m "chore: publish platform packages [skip ci]"
          git push origin HEAD:main
